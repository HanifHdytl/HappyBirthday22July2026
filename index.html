<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Love Surprise</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", Arial, sans-serif;
    }

    html,
    body {
      min-height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #fff0f7, #ffd6e7, #ffb6d0);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 32px;
      padding: 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(255, 70, 140, 0.35);
      animation: pop 0.6s ease;
      z-index: 3;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .progress {
      width: 100%;
      height: 9px;
      background: #ffe1ef;
      border-radius: 100px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 20%;
      border-radius: 100px;
      background: linear-gradient(135deg, #ff4f9a, #ff2474);
      transition: 0.4s ease;
    }

    .badge {
      display: inline-block;
      background: #fff0f7;
      color: #ff3f87;
      padding: 7px 15px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      color: #ff2f7d;
      font-size: 28px;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    p {
      color: #70495b;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      border: 2px solid #ffd0e4;
      outline: none;
      border-radius: 16px;
      padding: 14px 16px;
      text-align: center;
      color: #ff2f7d;
      font-size: 15px;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: #ff5f9e;
    }

    .girl-card {
      width: 135px;
      height: 135px;
      margin: 8px auto 14px;
      border-radius: 50%;
      padding: 5px;
      background: linear-gradient(135deg, #ff5f9e, #ffd166, #ff8fab);
      box-shadow: 0 15px 35px rgba(255, 79, 154, 0.28);
      animation: softFloat 3s ease-in-out infinite;
    }

    .girl-card img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
    }

    @keyframes softFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    .cute-gif {
      width: 190px;
      height: 170px;
      margin: 10px auto 18px;
      border-radius: 26px;
      background: linear-gradient(145deg, #fff7fb, #ffe2ef);
      border: 2px solid #ffd0e4;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(255, 79, 154, 0.2);
    }

    .cute-gif::before,
    .cute-gif::after {
      content: "💖";
      position: absolute;
      font-size: 26px;
      animation: flyHeart 3s infinite ease-in-out;
    }

    .cute-gif::before {
      left: 20px;
      bottom: 22px;
    }

    .cute-gif::after {
      right: 22px;
      top: 25px;
      animation-delay: 0.8s;
    }

    .gif-emoji {
      font-size: 78px;
      animation: bounce 1.3s infinite ease-in-out;
      z-index: 2;
    }

    .sparkle {
      position: absolute;
      font-size: 18px;
      animation: sparkle 1.8s infinite ease-in-out;
    }

    .sparkle.one {
      left: 35px;
      top: 30px;
    }

    .sparkle.two {
      right: 38px;
      bottom: 30px;
      animation-delay: 0.5s;
    }

    .sparkle.three {
      left: 78px;
      bottom: 18px;
      animation-delay: 1s;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-12px) scale(1.07);
      }
    }

    @keyframes flyHeart {
      0%, 100% {
        transform: translateY(0) scale(1);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-20px) scale(1.2);
        opacity: 1;
      }
    }

    @keyframes sparkle {
      0%, 100% {
        transform: scale(0.7) rotate(0deg);
        opacity: 0.5;
      }
      50% {
        transform: scale(1.3) rotate(25deg);
        opacity: 1;
      }
    }

    .love-note {
      background: #fff5fa;
      border: 1.5px dashed #ff8fba;
      border-radius: 18px;
      padding: 14px;
      color: #ff3f87;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
      width: 100%;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 16px;
      padding: 13px 18px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.25s ease;
      font-size: 14px;
      flex: 1;
      min-width: 140px;
    }

    .btn-main {
      color: white;
      background: linear-gradient(135deg, #ff5f9e, #ff2474);
      box-shadow: 0 10px 24px rgba(255, 36, 116, 0.35);
    }

    .btn-main:hover,
    .btn-soft:hover {
      transform: translateY(-2px);
    }

    .btn-soft {
      color: #ff3f87;
      background: #fff0f7;
    }

    .game-box {
      height: 220px;
      background: linear-gradient(180deg, #fff7fb, #ffe2ef);
      border: 2px dashed #ff95bd;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      margin-top: 14px;
    }

    .heart-game {
      position: absolute;
      top: -40px;
      font-size: 32px;
      cursor: pointer;
      animation: fall 3s linear forwards;
      user-select: none;
    }

    .memory-lane-container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 1rem;
      text-align: left;
    }

    .memory-lane-container .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .memory-lane-container .header h1 {
      font-size: 28px;
      color: #ff2f7d;
      margin-bottom: 10px;
      font-family: "Poppins", Arial, sans-serif;
      text-shadow: none;
    }

    .memory-lane-container .header p {
      color: #70495b;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.7;
      background: transparent;
      padding: 0;
      border-radius: 0;
      box-shadow: none;
      font-size: 15px;
      margin-bottom: 15px;
    }

    .slideshow-controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
      opacity: 1;
    }

    .slideshow-controls .btn {
      min-width: 100px;
      padding: 12px 16px;
      flex: 1;
      max-width: 170px;
    }

    .gallery-container {
      position: relative;
      margin: 0 0 1.5rem;
      border: 2px dashed rgba(255, 105, 180, 0.45);
      border-radius: 28px;
      background: #fff0f7;
      padding: 0.65rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      overflow: hidden;
    }

    .gallery {
      position: relative;
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      overflow-x: auto;
      gap: 1.5rem;
      padding: 0;
      scroll-behavior: smooth;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .gallery-path {
      position: absolute;
      top: 54%;
      left: 0;
      height: 4px;
      width: 100%;
      background: linear-gradient(135deg, #ff7cba, #ff3f87);
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
      transition: transform 0.35s ease, opacity 0.35s ease, box-shadow 0.35s ease;
    }

    .gallery:hover .gallery-path {
      transform: scaleY(1.6);
      opacity: 0.95;
      box-shadow: 0 0 18px rgba(255, 62, 128, 0.4);
    }

    .memory-card {
      z-index: 1;
    }

    .gallery::-webkit-scrollbar {
      display: none;
    }

    .gallery {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .gallery::-webkit-scrollbar {
      height: 8px;
    }

    .gallery::-webkit-scrollbar-track {
      background: #ffe1f3;
      border-radius: 10px;
    }

    .gallery::-webkit-scrollbar-thumb {
      background: #ff6ec4;
      border-radius: 10px;
    }

    .memory-card {
      flex: 0 0 auto;
      width: min(240px, calc(100% - 1.5rem));
      min-width: 180px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: none;
      transform: translateY(50px);
      opacity: 0;
      transition: all 0.6s ease;
      border: 6px solid rgba(255, 105, 180, 0.85);
      background: white;
      scroll-snap-align: center;
    }

    .memory-card.visible {
      transform: translateY(0) rotate(var(--rotate, 0deg));
      opacity: 1;
    }

    .memory-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    @media (max-width: 480px) {
      .memory-card {
        width: min(210px, calc(100% - 1rem));
        min-width: auto;
      }

      .memory-img {
        aspect-ratio: 4 / 5;
      }
    }

    .memory-card:hover .memory-img {
      transform: scale(1.05);
    }

    .memory-caption {
      position: absolute;
      bottom: -100%;
      left: 0;
      width: 100%;
      background: rgba(255, 240, 247, 0.75);
      color: #70495b;
      padding: 1rem;
      transition: bottom 0.35s ease;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .memory-card:hover .memory-caption {
      bottom: 0;
    }

    .card-tape {
      position: absolute;
      width: 54px;
      height: 16px;
      background: rgba(255, 105, 180, 0.9);
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      border: none;
      border-radius: 0 0 8px 8px;
      box-shadow: none;
    }

    .card-sticker {
      position: absolute;
      width: 38px;
      height: 38px;
      bottom: 10px;
      right: 10px;
      z-index: 3;
      transform: rotate(15deg);
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
    }

    .btn {
      padding: 10px 14px;
      margin: 0;
      background: linear-gradient(135deg, #ff5f9e, #ff2474);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transition: none;
    }

    .btn:hover {
      transform: none;
      box-shadow: none;
      background: linear-gradient(135deg, #ff5f9e, #ff2474);
    }

    .slideshow-controls .btn {
      min-width: 140px;
      padding: 13px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, #ff5f9e, #ff2474);
      box-shadow: none;
      transition: transform 0.25s ease;
    }

    #prevSlide {
      background: #fff0f7;
      color: #ff3f87;
    }

    .slideshow-controls .btn:hover {
      transform: translateY(-2px);
    }

    @keyframes bounce {
      0%, 100% {
        transform: scale(1) rotate(15deg);
      }
      50% {
        transform: scale(1.2) rotate(20deg);
      }
    }

    @media (max-width: 480px) {
      .memory-card {
        width: 220px;
        min-width: 220px;
      }

      .memory-lane-container .header h1 {
        font-size: 2rem;
      }

      .slideshow-controls {
        flex-direction: column;
      }
    }

    @keyframes fall {
      to {
        top: 235px;
      }
    }

    .score {
      color: #ff2f7d;
      font-weight: 800;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .signature {
      color: #ff2f7d;
      font-size: 19px;
      font-weight: 900;
      margin-top: 12px;
    }

    .floating-heart {
      position: fixed;
      bottom: -30px;
      font-size: 24px;
      pointer-events: none;
      animation: floatUp 6s linear forwards;
      z-index: 1;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) rotate(0deg);
        opacity: 0.9;
      }
      to {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 10px;
      pointer-events: none;
      animation: confettiFall 3s linear forwards;
      z-index: 10;
    }

    @keyframes confettiFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Cake Cutting Animation */
    .cake-cut-area {
      width: 220px;
      height: 170px;
      margin: 10px auto 18px;
      position: relative;
    }

    .cake-plate {
      width: 190px;
      height: 18px;
      background: #ffd1e3;
      border-radius: 50%;
      position: absolute;
      bottom: 15px;
      left: 15px;
      box-shadow: 0 8px 20px rgba(255, 79, 154, 0.25);
    }

    .cake-body {
      width: 180px;
      height: 105px;
      position: absolute;
      bottom: 28px;
      left: 20px;
      display: flex;
      transition: 0.8s ease;
      z-index: 2;
    }

    .cake-half {
      width: 50%;
      height: 100%;
      background: linear-gradient(180deg, #ff9ac2 0%, #ff75a8 45%, #ff4f91 100%);
      position: relative;
      border: 3px solid #fff;
      transition: 1s ease;
      overflow: hidden;
    }

    .cake-left {
      border-radius: 18px 0 0 18px;
    }

    .cake-right {
      border-radius: 0 18px 18px 0;
    }

    .cake-half::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 16px;
      background: #fff;
      top: 28px;
      left: 0;
    }

    .cake-half::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 14px;
      background: #ffe066;
      top: 58px;
      left: 0;
    }

    .candle {
      position: absolute;
      width: 14px;
      height: 42px;
      background: repeating-linear-gradient(
        45deg,
        #fff,
        #fff 5px,
        #ff4f91 5px,
        #ff4f91 10px
      );
      top: -38px;
      left: -7px;
      border-radius: 8px;
      z-index: 4;
    }

    .flame {
      width: 18px;
      height: 24px;
      background: radial-gradient(circle, #fff176, #ff9800, #ff3d00);
      border-radius: 50%;
      position: absolute;
      top: -25px;
      left: -2px;
      animation: flameMove 0.5s infinite alternate;
      transition: 0.4s ease;
    }

    @keyframes flameMove {
      from {
        transform: scale(1) rotate(-5deg);
      }
      to {
        transform: scale(1.15) rotate(5deg);
      }
    }

    .knife {
      position: absolute;
      width: 130px;
      height: 18px;
      background: linear-gradient(90deg, #dfe9f3, #ffffff, #9baec8);
      border-radius: 100px;
      top: 10px;
      left: 145px;
      transform: rotate(-35deg);
      transform-origin: left center;
      opacity: 0;
      z-index: 6;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
    }

    .knife::after {
      content: "";
      position: absolute;
      width: 38px;
      height: 20px;
      background: #ff4f91;
      border-radius: 12px;
      right: -28px;
      top: -1px;
    }

    .cut-line {
      position: absolute;
      width: 4px;
      height: 105px;
      background: rgba(255, 255, 255, 0.95);
      left: 108px;
      bottom: 28px;
      z-index: 5;
      opacity: 0;
      border-radius: 20px;
      transform-origin: top;
    }

    .cake-cut-area.cutting .knife {
      animation: knifeCut 1.2s ease forwards;
    }

    .cake-cut-area.cutting .cut-line {
      animation: showCut 0.5s ease forwards 0.8s;
    }

    .cake-cut-area.cutting .cake-left {
      transform: translateX(-18px) rotate(-4deg);
    }

    .cake-cut-area.cutting .cake-right {
      transform: translateX(18px) rotate(4deg);
    }

    .cake-cut-area.cutting .flame {
      opacity: 0;
      transform: scale(0);
    }

    @keyframes knifeCut {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(-35deg);
      }
      45% {
        opacity: 1;
        transform: translate(-55px, 70px) rotate(-35deg);
      }
      75% {
        opacity: 1;
        transform: translate(-70px, 100px) rotate(-35deg);
      }
      100% {
        opacity: 0;
        transform: translate(-100px, 125px) rotate(-35deg);
      }
    }

    @keyframes showCut {
      from {
        opacity: 0;
        transform: scaleY(0);
      }
      to {
        opacity: 1;
        transform: scaleY(1);
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 20px;
        border-radius: 26px;
      }

      h1 {
        font-size: 24px;
      }

      .cute-gif {
        width: 170px;
        height: 145px;
      }

      .gif-emoji {
        font-size: 65px;
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <div class="progress">
      <span id="progressBar"></span>
    </div>

    <div class="badge" id="stepBadge">Step 1 of 5</div>

    <div id="content"></div>

    <div class="buttons">
      <button class="btn-soft" id="backBtn">Back</button>
      <button class="btn-main" id="nextBtn">Next</button>
    </div>
  </div>

  <audio id="bgMusic" src="Lany.mp3" autoplay loop></audio>

  <script>
    let currentStep = 0;
    const totalSteps = 6;
    let birthdayName = "Beautiful Girl";
    let gameScore = 0;
    let gameStarted = false;
    let heartInterval;
    let memoryLaneInterval = null;

    const content = document.getElementById("content");
    const stepBadge = document.getElementById("stepBadge");
    const progressBar = document.getElementById("progressBar");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const bgMusic = document.getElementById("bgMusic");

    const girlPictures = [
      "Nala1.jpg",

    ];

    const randomGirlPicture =
      girlPictures[Math.floor(Math.random() * girlPictures.length)];

    function cuteGif(emoji) {
      return `
        <div class="cute-gif">
          <span class="sparkle one">✨</span>
          <span class="sparkle two">🌸</span>
          <span class="sparkle three">✨</span>
          <div class="gif-emoji">${emoji}</div>

      `;
    }

    function renderGirlPicture() {
      return `
        <div class="girl-card">
          <img 
            src="${randomGirlPicture}" 
            alt="Birthday girl"
            onerror="this.src='https://randomuser.me/api/portraits/women/44.jpg'"
          />
        </div>
      `;
    }

    function renderCakeCutting() {
      return `
        <div class="cake-cut-area" id="cakeCutArea">
          <div class="knife"></div>
          <div class="cut-line"></div>

          <div class="cake-body">
            <div class="cake-half cake-left"></div>

            <div class="cake-half cake-right">
              <div class="candle">
                <div class="flame"></div>
              </div>
            </div>
          </div>

          <div class="cake-plate"></div>
        </div>
      `;
    }

    const memories = [
      {
        image: "Nala1.jpg",
        caption:
          "Remember when we got lost hiking and found that amazing waterfall? Best wrong turn ever! 😂",
        emoji: "🌊",
        rotationAngle: -2,
      },
      {
        image: "Nala1.jpg",
        caption:
          "That time we stayed up all night just talking and watching the sunrise. I've never laughed so hard in my life!",
        emoji: "🌅",
        rotationAngle: 3,
      },
      {
        image: "Nala1.jpg",
        caption:
          "Our first road trip together! You fell asleep and I drew a tiny mustache on you with a marker. You didn't notice for HOURS!",
        emoji: "🚗",
        rotationAngle: -1,
      },
      {
        image: "4.jpg",
        caption:
          "Remember our cooking disaster when we tried to make that fancy recipe? The smoke alarm going off, but the pizza we ordered after was the best ever!",
        emoji: "🍕",
        rotationAngle: 2,
      },
      {
        image: "5.jpg",
        caption:
          "Our camping trip under the stars. You were terrified of that tiny spider and jumped so high! Still my favorite memory.",
        emoji: "🏕️",
        rotationAngle: -3,
      },
      {
        image: "7.jpg",
        caption:
          "That concert where we danced until our feet hurt. Worth every blister!",
        emoji: "🎵",
        rotationAngle: 1,
      },
      {
        image: "8.jpg",
        caption:
          "When we built that epic blanket fort during the storm and watched movies all day. Best rainy day ever!",
        emoji: "🏰",
        rotationAngle: -2,
      },
      {
        image: "1.jpg",
        caption:
          "Our spontaneous beach day when we skipped class. I still find sand in my backpack sometimes!",
        emoji: "🏖️",
        rotationAngle: 2,
      },
      {
        image: "2.jpeg",
        caption:
          "You've always been there for me through thick and thin. I'm so grateful for your friendship. ❤️",
        emoji: "💕",
        rotationAngle: -1,
      },
      {
        image: "3.jpg",
        caption:
          "Happy Birthday to my best friend in the whole world! Here's to many more adventures together!",
        emoji: "🎂",
        rotationAngle: 3,
      },
    ];

    function clearMemoryLaneInterval() {
      if (memoryLaneInterval) {
        clearInterval(memoryLaneInterval);
        memoryLaneInterval = null;
      }
    }

    function setupMemoryLane() {
      const galleryElement = document.getElementById("memoryGallery");
      const prevSlideBtn = document.getElementById("prevSlide");
      const nextSlideBtn = document.getElementById("nextSlide");

      if (!galleryElement) return;
      galleryElement.innerHTML = "";

      const path = document.createElement("div");
      path.className = "gallery-path";
      galleryElement.appendChild(path);

      memories.forEach((memory, index) => {
        const card = document.createElement("div");
        card.className = "memory-card";
        card.style.setProperty("--rotate", "0deg");
        card.style.animationDelay = `${index * 0.1}s`;

        card.innerHTML = `
          <div class="card-tape" style="--rotate: 0deg"></div>
          <img class="memory-img" src="${memory.image}" alt="Memory ${index + 1}" />
          <div class="memory-caption">${memory.caption}</div>
          <div class="card-sticker">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="50" fill="white" />
              <text x="50" y="65" font-family="Arial" font-size="40" text-anchor="middle" fill="#ff6ec4">${memory.emoji}</text>
            </svg>
          </div>
        `;

        galleryElement.appendChild(card);
      });

      const cards = galleryElement.querySelectorAll(".memory-card");
      cards.forEach((card, index) => {
        setTimeout(() => {
          card.classList.add("visible");
        }, 100 + index * 80);
      });

      setTimeout(() => {
        const path = galleryElement.querySelector(".gallery-path");
        if (path) {
          path.style.width = `${galleryElement.scrollWidth}px`;
        }
      }, 50);

      function scrollToSlide(index) {
        const cards = galleryElement.querySelectorAll(".memory-card");
        if (!cards[index]) return;

        const galleryRect = galleryElement.getBoundingClientRect();
        galleryElement.scrollTo({
          left: cards[index].offsetLeft - galleryRect.width / 2 + cards[index].offsetWidth / 2,
          behavior: "smooth",
        });
      }

      function moveSlide(direction) {
        const cards = galleryElement.querySelectorAll(".memory-card");
        if (cards.length === 0) return;

        currentSlide = (currentSlide + direction + cards.length) % cards.length;
        scrollToSlide(currentSlide);
      }

      let currentSlide = 1;

      prevSlideBtn.onclick = () => {
        moveSlide(-1);
      };

      nextSlideBtn.onclick = () => {
        moveSlide(1);
      };

      scrollToSlide(currentSlide);
    }

    function renderStep() {
      stepBadge.textContent = `Step ${currentStep + 1} of ${totalSteps}`;
      progressBar.style.width = `${((currentStep + 1) / totalSteps) * 100}%`;

      if (currentStep === 0) {
        backBtn.style.display = "none";
      } else {
        backBtn.style.display = "inline-flex";
      }
      nextBtn.textContent = currentStep === totalSteps - 1 ? "Replay" : "Next";

      if (currentStep === 0) {
        content.innerHTML = `
          <h1>A Special Birthday for Nadila 🎂💕</h1>
          ${renderGirlPicture()}
          ${cuteGif("🎁")}
          <p>Type Nadila's name and unlock a little birthday surprise made with love. 🎁💕.<br> Form Hanif, With Love ❤️</p>
          <input id="nameInput" placeholder="Type Nadila..." />
          <div class="love-note">
            A little surprise filled with love and best wishes.🌸💕
          </div>
        `;
      }

      if (currentStep === 1) {
        content.innerHTML = `
          <h1>Catch the Birthday Hearts ❤️</h1>
          ${cuteGif("💘")}
          <p>Let's play a little game! Catch all 7 hearts to unlock the next birthday surprise. 🎁💕</p>
          <button class="btn-main" onclick="startGame()">Start Game 🎮</button>
          <div class="score" id="scoreText">Score: 0 / 7</div>
          <div class="game-box" id="gameBox"></div>
        `;
      }

      if (currentStep === 2) {
        content.innerHTML = `
          <h1>Time to Cut the Birthday Cake! 🎂</h1>
          <p>Press the button and make a birthday wish before cutting the cake. ✨</p>

          ${renderCakeCutting()}

          <button class="btn-main" onclick="cutCake()">Cut the Cake 🍰</button>

          <div class="love-note hidden" id="wishMessage">
            May this birthday be as sweet as this cake, filled with laughter, blessings, and unforgettable memories. 🎉💕
          </div>
        `;
      }

      if (currentStep === 3) {
        content.innerHTML = `
          <h1>A Birthday Wish for ${birthdayName} 🌸</h1>
          ${renderGirlPicture()}
          ${cuteGif("💕")}
          <p>
            ❤️ Happy Birthday Sayang ❤️<br> Semoga di usia yang baru ini kamu selalu diberi kesehatan, kebahagiaan, dan kemudahan dalam setiap langkahmu. Tetap jaga diri kamu yaa, sayangi keluargamu, Orang Tersayang kamu dan terus kejar semua impian yang kamu inginkan. Terima kasih sudah menjadi bagian dari cerita dan hari-hariku. Semoga Allah selalu melindungi, memberkahi, dan memberikan yang terbaik untukmu. Semoga senyummu selalu menghiasi setiap harimu. ✨💕
          </p>
          <div class="love-note">
            Stay kind, stay strong, keep smiling, and may Allah always guide and protect you wherever you go. 🤍✨
          </div>
        `;
      }

      if (currentStep === 4) {
        content.innerHTML = `
          <div class="memory-lane-container">
            <div class="header">
              <h1>Memory Lane</h1>
              ${renderGirlPicture()}
              <p>
                Di sini ada beberapa momen yang pernah kita lewatin bareng. Semuanya punya cerita dan selalu jadi kenangan yang berarti buat aku. ✨💖
              </p>
            </div>

            <div class="slideshow-controls">
              <button id="prevSlide" class="btn-soft">← Prev</button>
              <button id="nextSlide" class="btn-main">Next →</button>
            </div>

            <div class="gallery-container">
              <div class="gallery" id="memoryGallery"></div>
            </div>
          </div>
        `;

        setupMemoryLane();
      }

      if (currentStep === 5) {
        content.innerHTML = `
          <h1>Happy Birthday, ${birthdayName}! 🎉💕</h1>
          ${renderGirlPicture()}
          ${cuteGif("🎉")}
          <p>
            Terima kasih ya, udah jadi Nadila yang aku kenal selama ini. Semoga di umur yang baru ini kamu makin dewasa, makin bijak dalam ngambil keputusan, dan bisa nikmatin setiap proses yang lagi kamu jalanin. Jangan lupa juga buat jaga diri, luangin waktu buat diri sendiri, dan tetap deket sama keluarga. Semoga semua yang lagi kamu usahain bisa tercapai satu per satu.🤍✨
          </p>
          <div class="love-note">
            Never stop smiling, keep believing in yourself, and always remember that you deserve all the happiness in the world. Happy Birthday, Nadila! 🤍✨
          </div>
          <div class="signature">With love and best wishes ❤️</div>
        `;

        launchConfetti();
      }
    }

    nextBtn.addEventListener("click", () => {
      if (currentStep === 0) {
        const input = document.getElementById("nameInput");
        if (input && input.value.trim()) {
          birthdayName = input.value.trim();
        }
      }

      clearInterval(heartInterval);
      clearMemoryLaneInterval();
      gameStarted = false;

      if (currentStep === totalSteps - 1) {
        currentStep = 0;
      } else {
        currentStep++;
      }

      renderStep();
    });

    backBtn.addEventListener("click", () => {
      if (currentStep > 0) {
        clearInterval(heartInterval);
        clearMemoryLaneInterval();
        gameStarted = false;
        currentStep--;
        renderStep();
      }
    });

    function startGame() {
      if (gameStarted) return;

      gameStarted = true;
      gameScore = 0;

      const scoreText = document.getElementById("scoreText");
      const gameBox = document.getElementById("gameBox");

      scoreText.textContent = "Score: 0 / 7";
      gameBox.innerHTML = "";

      heartInterval = setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart-game";
        heart.textContent = ["💖", "💘", "💕", "💗", "💝"][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 85 + "%";

        heart.onclick = () => {
          gameScore++;
          scoreText.textContent = `Score: ${gameScore} / 7`;
          heart.remove();

          if (gameScore >= 7) {
            clearInterval(heartInterval);
            gameBox.innerHTML = `
              <div style="padding:45px 15px; color:#ff2f7d; font-weight:900; font-size:20px; line-height:1.6;">
                You caught all the love! 💝<br>
                Extra birthday happiness unlocked ✨
              </div>
            `;
            launchConfetti();
          }
        };

        gameBox.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 3000);
      }, 650);
    }

    function cutCake() {
      const cakeArea = document.getElementById("cakeCutArea");
      const wishMessage = document.getElementById("wishMessage");

      if (!cakeArea) return;

      cakeArea.classList.add("cutting");

      setTimeout(() => {
        if (wishMessage) {
          wishMessage.classList.remove("hidden");
        }

        launchConfetti();
      }, 1200);
    }

    function createFloatingHeart() {
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.textContent = ["💖", "💕", "💗", "💘"][Math.floor(Math.random() * 4)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 4 + Math.random() * 3 + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(createFloatingHeart, 700);

    function launchConfetti() {
      const colors = ["#ff5f9e", "#ffd166", "#9b5de5", "#00bbf9", "#00f5d4"];

      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = 2 + Math.random() * 2 + "s";
        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 4000);
      }
    }

    function playBackgroundMusic() {
      if (!bgMusic) return;

      const playPromise = bgMusic.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          const resumeOnInteraction = () => {
            bgMusic.play().catch(() => {});
            window.removeEventListener("click", resumeOnInteraction);
          };
          window.addEventListener("click", resumeOnInteraction, { once: true });
        });
      }
    }

    renderStep();
    playBackgroundMusic();
  </script>

</body>
</html>
